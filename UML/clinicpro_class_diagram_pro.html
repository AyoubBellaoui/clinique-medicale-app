
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }

.page {
  background: #0f1521;
  padding: 32px 24px 40px;
  border-radius: 12px;
  overflow: hidden;
  position: relative;
}

.grid-bg {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(99,153,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,153,255,0.04) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
}

.corner-accent {
  position: absolute;
  width: 180px; height: 180px;
  border-radius: 50%;
  opacity: 0.07;
  pointer-events: none;
}
.ca-tl { top: -60px; left: -60px; background: #4a90e2; }
.ca-br { bottom: -60px; right: -60px; background: #1d9e75; }

.header {
  position: relative;
  text-align: center;
  margin-bottom: 28px;
}
.header-badge {
  display: inline-block;
  background: rgba(56,138,221,0.12);
  border: 1px solid rgba(56,138,221,0.25);
  color: #85b7eb;
  font-size: 11px;
  letter-spacing: 0.08em;
  padding: 4px 14px;
  border-radius: 20px;
  margin-bottom: 10px;
  text-transform: uppercase;
}
.header-title {
  font-size: 18px;
  font-weight: 500;
  color: #e8edf5;
  letter-spacing: 0.01em;
}
.header-sub {
  font-size: 12px;
  color: #6b7a95;
  margin-top: 4px;
}

.diagram-scroll {
  overflow-x: auto;
  position: relative;
}

.diagram-canvas {
  width: 1260px;
  padding: 8px 4px 20px;
}

svg.cls-diag text { font-family: var(--font-sans); }

.entity-box {
  filter: drop-shadow(0 2px 12px rgba(0,0,0,0.4));
}

.legend {
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-top: 24px;
  flex-wrap: wrap;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 11px;
  color: #6b7a95;
}
.legend-dot {
  width: 20px; height: 2px;
  border-radius: 2px;
}
.legend-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 1px 5px;
  border-radius: 3px;
}
</style>
